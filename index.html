<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人官网</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 
        首屏大图区域
        - 背景图在 style.css 中 .hero-section 更换
        - 标题和副标题在这里修改
    -->
    <header class="hero-section">
        <div class="hero-text">
        </div>
    </header>

    <main>
        <!-- 
            作品展示区域
            - 2列3行布局
            - 在下方 .portfolio-item 中更换图片和文字
        -->
        <section class="content-section">
            <h2>作品展示</h2>
            <div class="portfolio-grid">
                <!-- 作品1 -->
                <div class="portfolio-item">
                    <img src="images/UI-1.png" alt="作品1">
                    <div class="portfolio-caption">
                        <h3>二次元作品首页</h3>
                    </div>
                </div>
                <!-- 作品2 -->
                <div class="portfolio-item">
                    <img src="images/UI-2.png" alt="作品2">
                    <div class="portfolio-caption">
                        <h3>二次元作品拍脸图</h3>
                    </div>
                </div>
                <!-- 作品3 -->
                <div class="portfolio-item">
                    <img src="images/UI-3.png" alt="作品3">
                    <div class="portfolio-caption">
                        <h3>中国风启动页</h3>
                    </div>
                </div>
                <!-- 作品4 -->
                <div class="portfolio-item">
                    <img src="images/UI-4.png" alt="作品4">
                    <div class="portfolio-caption">
                        <h3>中国风人物属性页</h3>
                    </div>
                </div>
                <!-- 作品5 -->
                <div class="portfolio-item">
                    <img src="images/UI-5.png" alt="作品5">
                    <div class="portfolio-caption">
                        <h3>克苏鲁抽奖页</h3>
                    </div>
                </div>
                <!-- 作品6 -->
                <div class="portfolio-item">
                    <img src="images/UI-6.png" alt="作品6">
                    <div class="portfolio-caption">
                        <h3>克苏鲁人物属性页</h3>
                    </div>
                </div>
            </div>
        </section>

        <!-- 
            深度专栏区域
            - 2列图文布局
            - 在下方 .in-depth-item 中更换图片和文字
        -->
        <section class="content-section">
            <h2>动漫角色</h2>
            <div class="in-depth-grid">
                <!-- 专栏1 -->
                <div class="in-depth-item">
                    <img src="images/jiaose-01.png" alt="专栏文章1">
                    <h3>索隆</h3>
                    <p>背负誓言，绝不后退，只为成为世界第一大剑豪！</p>
                </div>
                <!-- 专栏2 -->
                <div class="in-depth-item">
                    <img src="images/jiaose-02.jpeg" alt="专栏文章2">
                    <h3>袁天罡</h3>
                    <p>算尽天机，独守大唐三百年的孤傲国师。</p>
                </div>
            </div>
        </section>

        <!-- 
            生活照片区域
            - 仿新闻中心布局
            - 在下方 .life-photo-item 中更换图片、日期和文字
        -->
        <section class="content-section">
            <h2>生活照片</h2>
            <div class="life-photos-grid">
                <!-- 照片1 -->
                <div class="life-photo-item">
                    <img src="images/sh-01.jpeg" alt="深圳生活">
                    <div class="life-photo-content">
                        <span class="life-photo-date">2024年3月15日</span>
                        <h4>朋友小猫的私密照</h4>
                    </div>
                </div>
                <!-- 照片2 -->
                <div class="life-photo-item">
                    <img src="images/sh-02.jpeg" alt="猫">
                    <div class="life-photo-content">
                        <span class="life-photo-date">2024年3月10日</span>
                        <h4>喜欢吃点好吃的</h4>
                    </div>
                </div>
                <!-- 照片3 -->
                <div class="life-photo-item">
                    <img src="images/sh-03.jpeg" alt="街拍">
                    <div class="life-photo-content">
                        <span class="life-photo-date">2024年2月28日</span>
                        <h4>爬玉龙雪山</h4>
                    </div>
                </div>
                <!-- 照片4 -->
                <div class="life-photo-item">
                    <img src="images/sh-04.png" alt="展览">
                    <div class="life-photo-content">
                        <span class="life-photo-date">2024年2月20日</span>
                        <h4>喜欢听音乐</h4>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- 
        结尾大图区域
        - 背景图在 style.css 中 .footer-section 更换
        - 标题和联系信息在这里修改
    -->
    <footer class="footer-section">
        <div class="footer-text">
        </div>
    </footer>

</body>
</html>
